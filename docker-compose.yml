version: "3.9"

services:
  pandemic:
    build:
      context: .
      dockerfile: Dockerfile
    image: pandemic-board-game:latest
    container_name: pandemic
    restart: unless-stopped
    ports:
      # HOST_PORT:CONTAINER_PORT
      # Change the left side to expose on a different host port (e.g. 80:3000)
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    # Uncomment to persist logs to a local directory:
    # volumes:
    #   - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
